<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Active Frame 2 Layout Editor</title>
  <style>
    @font-face {
      font-family: "MewgenicsMain";
      src: url("../../SVG Important/MainFont/fonts/6_Edmundm_EdmundMcMillen_INTLv4 Regular.ttf") format("truetype");
    }

    @font-face {
      font-family: "MewgenicsNumber";
      src: url("../../SVG Important/Number Fonts/fonts/1_TikaFont_TikaFont Adjusted Regular.ttf") format("truetype");
    }

    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
      background: #202124;
      color: #eeeeee;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(560px, 1fr) 380px;
    }

    main {
      padding: 18px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    aside {
      border-left: 1px solid #3d3f45;
      padding: 16px;
      background: #292b31;
      overflow: auto;
      max-height: 100vh;
      box-sizing: border-box;
    }

    #stage {
      position: relative;
      width: 480px;
      height: 600px;
      background:
        linear-gradient(45deg, #303238 25%, transparent 25%),
        linear-gradient(-45deg, #303238 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #303238 75%),
        linear-gradient(-45deg, transparent 75%, #303238 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
      border: 1px solid #555861;
      overflow: hidden;
    }

    .layer {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
      cursor: move;
      user-select: none;
    }

    .layer img {
      display: block;
      pointer-events: none;
      transform-origin: 0 0;
    }

    .text-layer {
      display: grid;
      place-items: center;
      box-sizing: border-box;
      border: 1px dashed rgba(101, 214, 255, 0.8);
      color: #000000;
      font-family: "MewgenicsMain", Arial, sans-serif;
      font-weight: 400;
      line-height: 1;
      overflow: hidden;
      pointer-events: none;
      text-align: center;
      transform-origin: 0 0;
      white-space: nowrap;
    }

    .text-value {
      display: block;
      line-height: 1;
    }

    .box-layer {
      box-sizing: border-box;
      border: 1px dashed rgba(101, 214, 255, 0.8);
      overflow: hidden;
      pointer-events: none;
      transform-origin: 0 0;
    }

    .box-layer img {
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: none;
      transform-origin: 0 0;
    }

    .layer.selected > .box-layer,
    .layer.selected > .text-layer,
    .layer.selected > img {
      outline: 1px dashed #65d6ff;
      outline-offset: 2px;
    }

    .toolbar {
      display: grid;
      gap: 10px;
    }

    .grid2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .layer-list {
      display: grid;
      gap: 6px;
      padding: 8px;
      border: 1px solid #444850;
      background: #202228;
    }

    .layer-row {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr) 28px 28px;
      gap: 8px;
      align-items: center;
      padding: 4px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .layer-row:hover,
    .layer-row.active {
      background: #343842;
    }

    .mini {
      width: 26px;
      height: 24px;
      padding: 0;
      font-size: 11px;
    }

    button,
    select,
    input,
    textarea {
      box-sizing: border-box;
      border: 1px solid #555861;
      background: #1d1f24;
      color: #f2f2f2;
      border-radius: 4px;
      padding: 8px;
      font: inherit;
    }

    button {
      cursor: pointer;
      background: #343842;
    }

    button:hover {
      background: #414754;
    }

    label {
      display: grid;
      gap: 5px;
      color: #d6d7dc;
      font-size: 13px;
    }

    textarea {
      width: 100%;
      min-height: 230px;
      resize: vertical;
      font-family: Consolas, monospace;
      font-size: 12px;
    }

    .hint,
    .label {
      color: #aeb2bd;
      font-size: 12px;
      line-height: 1.35;
    }
  </style>
</head>

    <div class="label">Active Frame 2 only</div>

    <div class="hint">Preview recolors only <code>#111111</code> to <code>#8a3746</code>. Layer <code>x/y</code> values are center anchors; main picture and text boxes use <code>Box W/H</code> containers.</div>

        <label>Center Y <input id="y" type="number" step="0.25"></label>
        <label>Rotate <input id="rotation" type="number" step="0.25"></label>
      </div>
      <div class="grid3">
        <label>Scale X <input id="scaleX" type="number" step="0.01"></label>
        <label>Scale Y <input id="scaleY" type="number" step="0.01"></label>
        <label>Visible <input id="visible" type="checkbox"></label>

      <div class="grid2">
        <label>Box W <input id="boxWidth" type="number" step="0.25"></label>
        <label>Box H <input id="boxHeight" type="number" step="0.25"></label>
      </div>
      <div class="grid3">
        <button id="exportBtn" type="button">Export JSON</button>

    function cloneRules() {
      return JSON.parse(JSON.stringify(rules));
    }

    function updateUndoButton() {
      undoBtn.disabled = undoStack.length === 0;
    }

    function pushUndo() {
      undoStack.push({ rules: cloneRules(), selectedId });
      if (undoStack.length > 80) undoStack.shift();
      updateUndoButton();
    }

    function undoLast() {
      const snapshot = undoStack.pop();
      if (!snapshot) return;
      rules = snapshot.rules;
      selectedId = snapshot.selectedId;
      jsonBox.value = JSON.stringify(rules, null, 2);
      updateUndoButton();
      render();
    }

    function layerById(id) {
      return rules.layers.find(layer => layer.id === id);
    }

    function canvasViewBox() {
      const fallback = `0 0 ${rules.canvas?.width || 120} ${rules.canvas?.height || 150}`;
      const parts = String(rules.canvas?.viewBox || fallback).trim().split(/\s+/).map(Number);
      if (parts.length !== 4 || parts.some(Number.isNaN)) {
        return { minX: 0, minY: 0, width: rules.canvas?.width || 120, height: rules.canvas?.height || 150 };
      }
      return { minX: parts[0], minY: parts[1], width: parts[2], height: parts[3] };
    }

    function syncStageSize() {
      const viewBox = canvasViewBox();
      stage.style.width = `${viewBox.width * stageScale}px`;
      stage.style.height = `${viewBox.height * stageScale}px`;
    }

    function estimatedTextWidth(text, fontSize) {
      return String(text || "").length * fontSize * 0.62;
    }

    function fitBoxFont(layer) {
      const boxWidth = layer.boxWidth || 18;
      const boxHeight = layer.boxHeight || 13;
      const minFontSize = layer.minFontSize || 4;
      let fontSize = layer.fontSize || 12;
      while (fontSize > minFontSize) {
        if (estimatedTextWidth(layer.text || "0", fontSize) <= boxWidth && fontSize <= boxHeight) return fontSize;
        fontSize -= 0.25;
      }
      return minFontSize;
    }

    function hasBox(layer) {
      return Boolean(layer.boxWidth && layer.boxHeight && (layer.type === "text" || layer.fitMode));
    }

    function layerAnchor(layer) {
      if (Number.isFinite(Number(layer.anchorX)) && Number.isFinite(Number(layer.anchorY))) {
        return { x: Number(layer.anchorX), y: Number(layer.anchorY) };
      }
      if (layer.type === "text") {
        return { x: (layer.boxWidth || 0) / 2, y: (layer.boxHeight || 0) / 2 };
      }
      return { x: 0, y: 0 };
    }

    function recolorSvgText(text) {
      let result = text;
      for (const [from, to] of Object.entries(previewRecolor)) {
        const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        result = result.replace(new RegExp(escaped, "gi"), to);
      }
      result = result.replace(/rgb\(\s*17\s*,\s*17\s*,\s*17\s*\)/gi, previewRecolor["#111111"]);
      return result;
    }

    async function previewSource(source) {
      if (objectUrls.has(source)) return objectUrls.get(source);
      const previewPath = source === "$main" ? sampleMainSource : source;
      try {
        const response = await fetch(previewPath, { cache: "no-store" });
        if (!response.ok) return previewPath;
        const rawText = await response.text();
        const text = source === "$main" ? rawText : recolorSvgText(rawText);
        const url = URL.createObjectURL(new Blob([text], { type: "image/svg+xml" }));
        objectUrls.set(source, url);
        return url;
      } catch (_error) {
        return previewPath;
      }
    }

    function moveLayer(id, delta) {
      const index = rules.layers.findIndex(layer => layer.id === id);
      const next = index + delta;
      if (index < 0 || next < 0 || next >= rules.layers.length) return;
      pushUndo();
      const item = rules.layers.splice(index, 1)[0];
      rules.layers.splice(next, 0, item);
      selectedId = id;
      render();
    }

    async function render() {
      const currentRender = ++renderRun;
      syncStageSize();
      const stageFragment = document.createDocumentFragment();
      const selectFragment = document.createDocumentFragment();
      const listFragment = document.createDocumentFragment();

      for (const [index, layer] of rules.layers.entries()) {
        const option = document.createElement("option");
        option.value = layer.id;
        option.textContent = layer.label || layer.id;
        selectFragment.append(option);

        const row = document.createElement("label");
        row.className = "layer-row";
        if (layer.id === selectedId) row.classList.add("active");
        const check = document.createElement("input");
        check.type = "checkbox";
        check.checked = layer.visible !== false;
        check.addEventListener("change", event => {
          event.stopPropagation();
          pushUndo();
          layer.visible = check.checked;
          selectedId = layer.id;
          render();
        });
        const text = document.createElement("span");
        text.textContent = layer.label || layer.id;
        const up = document.createElement("button");
        up.type = "button";
        up.className = "mini";
        up.textContent = "Up";
        up.disabled = index === rules.layers.length - 1;
        up.addEventListener("click", event => {
          event.stopPropagation();
          moveLayer(layer.id, 1);
        });
        const down = document.createElement("button");
        down.type = "button";
        down.className = "mini";
        down.textContent = "Dn";
        down.disabled = index === 0;
        down.addEventListener("click", event => {
          event.stopPropagation();
          moveLayer(layer.id, -1);
        });
        row.addEventListener("click", event => {
          if (event.target !== check && event.target !== up && event.target !== down) {
            selectedId = layer.id;
            render();
          }
        });
        row.append(check, text, up, down);
        listFragment.append(row);

        const el = document.createElement("div");
        el.className = "layer";
        if (layer.id === selectedId) el.classList.add("selected");
        el.dataset.id = layer.id;
        el.style.display = layer.visible === false ? "none" : "block";
        el.style.zIndex = String(index + 1);
        el.style.transform = layerTransform(layer);

        if (layer.type === "text") {
          const textEl = document.createElement("div");
          textEl.className = "text-layer";
          textEl.style.width = `${(layer.boxWidth || 18) * stageScale}px`;
          textEl.style.height = `${(layer.boxHeight || 13) * stageScale}px`;
          textEl.style.color = layer.fill || "#000000";
          textEl.style.transform = `translate(${-layerAnchor(layer).x * stageScale}px, ${-layerAnchor(layer).y * stageScale}px)`;
          textEl.style.fontFamily = `"${layer.fontFamily || "MewgenicsMain"}", Arial, sans-serif`;
          const textValue = document.createElement("span");
          textValue.className = "text-value";
          textValue.textContent = layer.text || "0";
          textValue.style.fontSize = `${fitBoxFont(layer) * stageScale}px`;
          textEl.append(textValue);
          el.append(textEl);
        } else {
          const img = document.createElement("img");
          img.src = await previewSource(layer.source);
          if (currentRender !== renderRun) return;
          img.draggable = false;
          if (hasBox(layer)) {
            const box = document.createElement("div");
            box.className = "box-layer";
            box.style.width = `${layer.boxWidth * stageScale}px`;
            box.style.height = `${layer.boxHeight * stageScale}px`;
            box.style.transform = `translate(${-(layer.boxWidth / 2) * stageScale}px, ${-(layer.boxHeight / 2) * stageScale}px)`;
            img.style.objectFit = layer.fitMode === "contain" ? "contain" : "fill";
            box.append(img);
            el.append(box);
          } else {
            img.style.transform = `translate(${-layerAnchor(layer).x * stageScale}px, ${-layerAnchor(layer).y * stageScale}px) scale(${stageScale})`;
            el.append(img);
          }
        }
        stageFragment.append(el);
      }

      if (currentRender !== renderRun) return;
      stage.replaceChildren(stageFragment);
      layerSelect.replaceChildren(selectFragment);
      layerList.replaceChildren(listFragment);
      layerSelect.value = selectedId;
      syncControls();
    }

    function syncControls() {
      const layer = layerById(selectedId);
      if (!layer) return;
      fields.x.value = layer.x || 0;
      fields.y.value = layer.y || 0;
      fields.scaleX.value = layer.scaleX ?? 1;
      fields.scaleY.value = layer.scaleY ?? 1;
      fields.rotation.value = layer.rotation || 0;
      fields.visible.checked = layer.visible !== false;
      fields.boxWidth.value = layer.boxWidth || "";
      fields.boxHeight.value = layer.boxHeight || "";
      fields.boxWidth.disabled = !hasBox(layer) && layer.id !== "main_picture";
      fields.boxHeight.disabled = !hasBox(layer) && layer.id !== "main_picture";
    }

    function layerTransform(layer) {
      const viewBox = canvasViewBox();
      return `translate(${(layer.x - viewBox.minX) * stageScale}px, ${(layer.y - viewBox.minY) * stageScale}px) rotate(${layer.rotation || 0}deg) scale(${layer.scaleX ?? 1}, ${layer.scaleY ?? 1})`;
    }

    function applyLayerTransform(layer) {
      const el = stage.querySelector(`.layer[data-id="${layer.id}"]`);
      if (el) el.style.transform = layerTransform(layer);
    }

    function updateSelected() {
      const layer = layerById(selectedId);
      if (!layer) return;
      pushUndo();
      layer.x = Number(fields.x.value);
      layer.y = Number(fields.y.value);
      layer.scaleX = Number(fields.scaleX.value);
      layer.scaleY = Number(fields.scaleY.value);
      layer.rotation = Number(fields.rotation.value);
      layer.visible = fields.visible.checked;
      if (layer.type === "text") {
        layer.boxWidth = Number(fields.boxWidth.value || 18);
        layer.boxHeight = Number(fields.boxHeight.value || 13);
        layer.anchor = "center";
        layer.anchorX = layer.boxWidth / 2;
        layer.anchorY = layer.boxHeight / 2;
      } else if (layer.id === "main_picture" || layer.fitMode) {
        layer.boxWidth = Number(fields.boxWidth.value || layer.boxWidth || 62.15);
        layer.boxHeight = Number(fields.boxHeight.value || layer.boxHeight || 52.35);
        layer.fitMode = layer.fitMode || "contain";
        layer.anchor = "center";
        layer.anchorX = layer.boxWidth / 2;
        layer.anchorY = layer.boxHeight / 2;
      }
      render();
    }

    layerSelect.addEventListener("change", () => {
      selectedId = layerSelect.value;
      render();
    });

    Object.values(fields).forEach(input => input.addEventListener("input", updateSelected));

    stage.addEventListener("pointerdown", event => {
      const layer = layerById(selectedId);
      if (!layer || layer.visible === false) return;
      pushUndo();
      drag = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        layerId: layer.id,
        layerX: layer.x || 0,
        layerY: layer.y || 0
      };
      stage.setPointerCapture(event.pointerId);
    });

    stage.addEventListener("pointermove", event => {
      if (!drag || event.pointerId !== drag.pointerId) return;
      const layer = layerById(drag.layerId);
      if (!layer) return;
      layer.x = Math.round((drag.layerX + (event.clientX - drag.startX) / stageScale) * 4) / 4;
      layer.y = Math.round((drag.layerY + (event.clientY - drag.startY) / stageScale) * 4) / 4;
      fields.x.value = layer.x;
      fields.y.value = layer.y;
      applyLayerTransform(layer);
    });

    stage.addEventListener("pointerup", () => {
      drag = null;
    });

    document.querySelector("#exportBtn").addEventListener("click", () => {
      jsonBox.value = JSON.stringify(rules, null, 2);
      jsonBox.select();
    });

    document.querySelector("#importBtn").addEventListener("click", () => {
      pushUndo();
      rules = JSON.parse(jsonBox.value);
      selectedId = rules.layers[0]?.id || "";
      render();
    });

    undoBtn.addEventListener("click", undoLast);

    jsonBox.value = JSON.stringify(rules, null, 2);
    updateUndoButton();
    render();
  </script>
</body>
</html>
